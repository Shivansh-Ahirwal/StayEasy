# Local stack aligned with free cloud targets:
# - Postgres → Neon / Supabase (free tiers)
# - Redis → Upstash (free tier)
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yoyo
      POSTGRES_PASSWORD: yoyo
      POSTGRES_DB: yoyo
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - sh
      - -c
      - >-
        python manage.py migrate --noinput &&
        python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - '8000:8000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      DJANGO_SECRET_KEY: dev-docker-secret-change-me
      DJANGO_DEBUG: 'true'
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,api
      DATABASE_URL: postgres://yoyo:yoyo@db:5432/yoyo
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      OLLAMA_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2:3b
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      VITE_PROXY_TARGET: http://api:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - api

volumes:
  pgdata:
  frontend_node_modules:
